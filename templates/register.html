{% extends 'base.html' %}

{% block title %}Register - ShopMetuge{% endblock %}

{% block content %}
<style>
    /* Modern Registration Page Styling */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --secondary: #8b5cf6;
        --success: #10b981;
        --success-light: #d1fae5;
        --danger: #ef4444;
        --danger-light: #fee2e2;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --info: #3b82f6;
        --info-light: #dbeafe;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
        
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        
        --radius-sm: 0.375rem;
        --radius: 0.5rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.5rem;
        --radius-2xl: 2rem;
        --radius-full: 9999px;
        
        --transition-fast: 200ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-bounce: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
        background: linear-gradient(135deg, #667eea0a 0%, #764ba20a 100%);
        min-height: 100vh;
    }

    /* Page Container */
    .row.justify-content-center {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        padding: 2rem 0;
    }

    /* Registration Card */
    .col-md-6 {
        background: white;
        border-radius: var(--radius-2xl);
        padding: 3rem !important;
        box-shadow: var(--shadow-2xl);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--gray-200);
        max-width: 500px;
        margin: 0 auto;
    }

    .col-md-6::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--primary), var(--secondary), var(--success));
        animation: gradientMove 3s linear infinite;
        background-size: 200% 100%;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 0; }
        100% { background-position: 200% 0; }
    }

    /* Header */
    h2 {
        font-size: 2rem;
        font-weight: 800;
        color: var(--gray-900);
        margin-bottom: 2rem;
        position: relative;
        display: inline-block;
    }

    h2::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 0;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: var(--radius-full);
        animation: expandWidth 0.8s ease-out 0.3s both;
    }

    h2 i {
        color: var(--primary);
        margin-right: 0.5rem;
    }

    /* Form Labels */
    .form-label {
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .form-label i {
        color: var(--primary);
        font-size: 1rem;
    }

    /* Form Controls */
    .form-control {
        border: 2px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 0.875rem 1rem;
        font-size: 1rem;
        transition: all var(--transition-fast);
        background: var(--gray-50);
        width: 100%;
    }

    .form-control:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 4px var(--primary-light);
        background: white;
    }

    .form-control::placeholder {
        color: var(--gray-400);
        font-size: 0.95rem;
    }

    /* Input Groups with Validation Icons */
    .input-group {
        position: relative;
    }

    .validation-icon {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.25rem;
        z-index: 10;
        transition: all var(--transition);
    }

    /* Password Strength Meter */
    .password-strength {
        margin-top: 0.5rem;
        padding: 0.5rem;
        background: var(--gray-100);
        border-radius: var(--radius-lg);
    }

    .strength-bar {
        height: 6px;
        background: var(--gray-300);
        border-radius: var(--radius-full);
        overflow: hidden;
        margin-bottom: 0.5rem;
    }

    .strength-progress {
        height: 100%;
        width: 0;
        border-radius: var(--radius-full);
        transition: width 0.3s ease, background-color 0.3s ease;
    }

    .strength-text {
        font-size: 0.85rem;
        color: var(--gray-600);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .strength-requirements {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
        margin-top: 0.75rem;
        font-size: 0.85rem;
    }

    .requirement {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        color: var(--gray-500);
        transition: color var(--transition);
    }

    .requirement.met {
        color: var(--success);
    }

    .requirement i {
        font-size: 0.9rem;
    }

    /* Admin Code Section */
    .admin-code-section {
        position: relative;
        margin: 1.5rem 0;
        padding: 1.5rem;
        background: linear-gradient(135deg, var(--gray-50), var(--gray-100));
        border-radius: var(--radius-xl);
        border: 2px dashed var(--gray-300);
        transition: all var(--transition);
        animation: fadeInRight 0.6s ease-out 0.4s both;
    }

    .admin-code-section:hover {
        border-color: var(--primary);
        background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
    }

    .admin-code-section .form-label {
        margin-bottom: 1rem;
    }

    .admin-code-section .badge {
        background: linear-gradient(135deg, var(--warning), #d97706);
        color: white;
        padding: 0.35rem 0.75rem;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        margin-left: 0.5rem;
    }

    .admin-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: var(--gray-600);
    }

    .admin-info i {
        color: var(--warning);
    }

    /* Register Button */
    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: var(--radius-lg);
        font-weight: 700;
        font-size: 1.1rem;
        transition: all var(--transition-bounce);
        box-shadow: var(--shadow-lg);
        width: 100%;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 1rem;
        animation: fadeInRight 0.6s ease-out 0.5s both;
    }

    .btn-primary::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .btn-primary:hover::before {
        width: 300px;
        height: 300px;
    }

    .btn-primary:hover {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        transform: translateY(-3px);
        box-shadow: var(--shadow-2xl);
    }

    .btn-primary i {
        font-size: 1.2rem;
        transition: transform var(--transition);
    }

    .btn-primary:hover i {
        transform: translateX(5px) scale(1.2);
    }

    /* Login Link */
    .login-link {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 2px solid var(--gray-200);
        animation: fadeInRight 0.6s ease-out 0.6s both;
    }

    .login-link p {
        color: var(--gray-600);
        margin-bottom: 0.5rem;
    }

    .login-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
        font-size: 1.1rem;
        transition: all var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .login-link a i {
        transition: transform var(--transition);
    }

    .login-link a:hover {
        color: var(--primary-dark);
    }

    .login-link a:hover i {
        transform: translateX(5px);
    }

    /* Terms & Conditions */
    .terms-section {
        margin: 1.5rem 0;
        padding: 1rem;
        background: var(--gray-50);
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        color: var(--gray-600);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        animation: fadeInRight 0.6s ease-out 0.45s both;
    }

    .terms-section input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--primary);
    }

    .terms-section label {
        cursor: pointer;
    }

    .terms-section a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .terms-section a:hover {
        text-decoration: underline;
    }

    /* Animations */
    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(30px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes expandWidth {
        from { width: 0; }
        to { width: 60px; }
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    /* Loading Spinner */
    .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast-notification {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: linear-gradient(135deg, var(--success), #059669);
        color: white;
        padding: 1rem 2rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-2xl);
        transform: translateX(400px);
        transition: transform 0.3s ease;
        z-index: 9999;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .toast-notification.show {
        transform: translateX(0);
    }

    .toast-notification i {
        font-size: 1.25rem;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .col-md-6 {
            padding: 2rem !important;
            margin: 1rem;
        }

        h2 {
            font-size: 1.75rem;
        }

        .strength-requirements {
            grid-template-columns: 1fr;
        }

        .btn-primary {
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
        }
    }

    @media (max-width: 480px) {
        .col-md-6 {
            padding: 1.5rem !important;
        }

        h2 {
            font-size: 1.5rem;
        }

        .form-control {
            padding: 0.75rem 0.875rem;
        }

        .admin-code-section {
            padding: 1rem;
        }

        .terms-section {
            flex-direction: column;
            text-align: center;
        }
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
        .col-md-6 {
            background: var(--gray-800);
            border-color: var(--gray-700);
        }

        h2 {
            color: white;
        }

        .form-label {
            color: var(--gray-300);
        }

        .form-control {
            background: var(--gray-700);
            border-color: var(--gray-600);
            color: white;
        }

        .form-control:focus {
            background: var(--gray-600);
        }

        .password-strength {
            background: var(--gray-700);
        }

        .strength-text {
            color: var(--gray-400);
        }

        .admin-code-section {
            background: linear-gradient(135deg, var(--gray-700), var(--gray-800));
            border-color: var(--gray-600);
        }

        .admin-info {
            color: var(--gray-400);
        }

        .terms-section {
            background: var(--gray-700);
            color: var(--gray-400);
        }

        .login-link {
            border-top-color: var(--gray-700);
        }

        .login-link p {
            color: var(--gray-400);
        }
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>
            <i class="bi bi-person-plus"></i> 
            Create Account
        </h2>

        <!-- Registration Form -->
        <form method="post" action="{{ url_for('register') }}" id="registerForm">
            <!-- Username Field -->
            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person"></i> Full Name
                </label>
                <div class="input-group">
                    <input type="text" 
                           class="form-control" 
                           id="username" 
                           name="username" 
                           placeholder="Enter your full name"
                           required 
                           autocomplete="name"
                           autofocus>
                    <i class="bi bi-check-circle-fill text-success validation-icon" id="usernameValid" style="display: none;"></i>
                    <i class="bi bi-exclamation-circle-fill text-danger validation-icon" id="usernameInvalid" style="display: none;"></i>
                </div>
                <small class="text-muted">Minimum 3 characters</small>
            </div>

            <!-- Email Field -->
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <div class="input-group">
                    <input type="email" 
                           class="form-control" 
                           id="email" 
                           name="email" 
                           placeholder="Enter your email"
                           required 
                           autocomplete="email">
                    <i class="bi bi-check-circle-fill text-success validation-icon" id="emailValid" style="display: none;"></i>
                    <i class="bi bi-exclamation-circle-fill text-danger validation-icon" id="emailInvalid" style="display: none;"></i>
                </div>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <div class="input-group">
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="Create a strong password"
                           required 
                           autocomplete="new-password">
                    <i class="bi bi-eye-slash password-toggle" id="togglePassword" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; z-index: 10; color: var(--gray-400);"></i>
                </div>

                <!-- Password Strength Meter -->
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-progress" id="strengthProgress"></div>
                    </div>
                    <div class="strength-text">
                        <span id="strengthLabel">Enter a password</span>
                        <span id="strengthScore">0/4</span>
                    </div>
                    
                    <div class="strength-requirements">
                        <span class="requirement" id="req-length">
                            <i class="bi bi-circle"></i> 8+ characters
                        </span>
                        <span class="requirement" id="req-upper">
                            <i class="bi bi-circle"></i> Uppercase letter
                        </span>
                        <span class="requirement" id="req-lower">
                            <i class="bi bi-circle"></i> Lowercase letter
                        </span>
                        <span class="requirement" id="req-number">
                            <i class="bi bi-circle"></i> Number
                        </span>
                        <span class="requirement" id="req-special">
                            <i class="bi bi-circle"></i> Special character
                        </span>
                    </div>
                </div>
            </div>
<!--
            <!-- Admin Code Section 
            <div class="admin-code-section">
                <label for="admin_code" class="form-label">
                    <i class="bi bi-shield-check"></i> Admin Registration Code
                    <span class="badge">Optional</span>
                </label>
                <input type="text" 
                       class="form-control" 
                       id="admin_code" 
                       name="admin_code" 
                       placeholder="Enter admin code (leave blank for customer accounts)">
                <div class="admin-info">
                    <i class="bi bi-info-circle"></i>
                    <span>Leave empty to create a regular customer account. Admin codes are provided by system administrators.</span>
                </div>
            </div>
        -->

            <!-- Terms & Conditions -->
            <div class="terms-section">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    <a href="{{ url_for('privacy_policy') }}" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <!-- Hidden role field (will be set by JavaScript) -->
            <input type="hidden" name="role" id="role" value="customer">

            <button type="submit" class="btn-primary" id="registerBtn">
                <i class="bi bi-person-plus"></i>
                <span>Create Account</span>
            </button>
        </form>

        <!-- Login Link -->
        <div class="login-link">
            <p>Already have an account?</p>
            <a href="{{ url_for('login') }}">
                Sign In <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script>
    // Modern JavaScript for Registration Page
    (function() {
        'use strict';

        // Toast notification system
        function showToast(message, type = 'success', icon = 'bi-check-circle-fill') {
            const toastContainer = document.querySelector('.toast-container');
            if (!toastContainer) return;

            const colors = {
                success: 'linear-gradient(135deg, #10b981, #059669)',
                warning: 'linear-gradient(135deg, #f59e0b, #d97706)',
                danger: 'linear-gradient(135deg, #ef4444, #dc2626)',
                info: 'linear-gradient(135deg, #3b82f6, #2563eb)'
            };

            const toastId = 'toast-' + Date.now();
            const toastHtml = `
                <div id="${toastId}" class="toast-notification show" style="background: ${colors[type] || colors.success}">
                    <i class="bi ${icon}"></i>
                    <div class="toast-message">${message}</div>
                </div>
            `;

            toastContainer.insertAdjacentHTML('beforeend', toastHtml);

            setTimeout(() => {
                const toast = document.getElementById(toastId);
                if (toast) {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }

        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');

        if (togglePassword && password) {
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                
                // Toggle icon
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
                
                showToast(type === 'text' ? 'Password visible' : 'Password hidden', 'info', 'bi-eye');
            });
        }

        // Password strength checker
        const strengthProgress = document.getElementById('strengthProgress');
        const strengthLabel = document.getElementById('strengthLabel');
        const strengthScore = document.getElementById('strengthScore');
        
        const reqLength = document.getElementById('req-length');
        const reqUpper = document.getElementById('req-upper');
        const reqLower = document.getElementById('req-lower');
        const reqNumber = document.getElementById('req-number');
        const reqSpecial = document.getElementById('req-special');

        function checkPasswordStrength() {
            const pwd = password.value;
            let score = 0;
            
            // Check length
            const hasLength = pwd.length >= 8;
            if (hasLength) {
                score++;
                reqLength.classList.add('met');
                reqLength.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqLength.classList.remove('met');
                reqLength.querySelector('i').className = 'bi bi-circle';
            }
            
            // Check uppercase
            const hasUpper = /[A-Z]/.test(pwd);
            if (hasUpper) {
                score++;
                reqUpper.classList.add('met');
                reqUpper.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqUpper.classList.remove('met');
                reqUpper.querySelector('i').className = 'bi bi-circle';
            }
            
            // Check lowercase
            const hasLower = /[a-z]/.test(pwd);
            if (hasLower) {
                score++;
                reqLower.classList.add('met');
                reqLower.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqLower.classList.remove('met');
                reqLower.querySelector('i').className = 'bi bi-circle';
            }
            
            // Check number
            const hasNumber = /[0-9]/.test(pwd);
            if (hasNumber) {
                score++;
                reqNumber.classList.add('met');
                reqNumber.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqNumber.classList.remove('met');
                reqNumber.querySelector('i').className = 'bi bi-circle';
            }
            
            // Check special character
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd);
            if (hasSpecial) {
                score++;
                reqSpecial.classList.add('met');
                reqSpecial.querySelector('i').className = 'bi bi-check-circle-fill';
            } else {
                reqSpecial.classList.remove('met');
                reqSpecial.querySelector('i').className = 'bi bi-circle';
            }
            
            // Update progress bar
            const percentage = (score / 5) * 100;
            strengthProgress.style.width = percentage + '%';
            
            // Update colors and labels
            if (pwd.length === 0) {
                strengthProgress.style.backgroundColor = 'var(--gray-300)';
                strengthLabel.textContent = 'Enter a password';
                strengthScore.textContent = '0/5';
            } else if (score <= 2) {
                strengthProgress.style.backgroundColor = 'var(--danger)';
                strengthLabel.textContent = 'Weak password';
                strengthScore.textContent = score + '/5';
            } else if (score <= 4) {
                strengthProgress.style.backgroundColor = 'var(--warning)';
                strengthLabel.textContent = 'Medium password';
                strengthScore.textContent = score + '/5';
            } else {
                strengthProgress.style.backgroundColor = 'var(--success)';
                strengthLabel.textContent = 'Strong password';
                strengthScore.textContent = score + '/5';
            }
        }

        password.addEventListener('input', checkPasswordStrength);

        // Username validation
        const username = document.getElementById('username');
        const usernameValid = document.getElementById('usernameValid');
        const usernameInvalid = document.getElementById('usernameInvalid');

        username.addEventListener('input', function() {
            const value = this.value;
            const isValid = value.length >= 3;
            
            if (value.length > 0) {
                if (isValid) {
                    usernameValid.style.display = 'block';
                    usernameInvalid.style.display = 'none';
                    this.style.borderColor = 'var(--success)';
                } else {
                    usernameValid.style.display = 'none';
                    usernameInvalid.style.display = 'block';
                    this.style.borderColor = 'var(--danger)';
                }
            } else {
                usernameValid.style.display = 'none';
                usernameInvalid.style.display = 'none';
                this.style.borderColor = '';
            }
        });

        // Email validation
        const email = document.getElementById('email');
        const emailValid = document.getElementById('emailValid');
        const emailInvalid = document.getElementById('emailInvalid');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        email.addEventListener('input', function() {
            const isValid = emailRegex.test(this.value);
            
            if (this.value.length > 0) {
                if (isValid) {
                    emailValid.style.display = 'block';
                    emailInvalid.style.display = 'none';
                    this.style.borderColor = 'var(--success)';
                } else {
                    emailValid.style.display = 'none';
                    emailInvalid.style.display = 'block';
                    this.style.borderColor = 'var(--danger)';
                }
            } else {
                emailValid.style.display = 'none';
                emailInvalid.style.display = 'none';
                this.style.borderColor = '';
            }
        });

        // Admin code detection - automatically set role
        const adminCode = document.getElementById('admin_code');
        const role = document.getElementById('role');

        adminCode.addEventListener('input', function() {
            if (this.value.trim().length > 0) {
                role.value = 'admin';
                showToast('Admin registration mode activated', 'warning', 'bi-shield-check');
            } else {
                role.value = 'customer';
            }
        });

        // Form validation
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const termsCheckbox = document.getElementById('terms');

        registerForm.addEventListener('submit', function(e) {
            // Validate username
            if (username.value.length < 3) {
                e.preventDefault();
                username.style.borderColor = 'var(--danger)';
                usernameInvalid.style.display = 'block';
                showToast('Username must be at least 3 characters', 'warning', 'bi-exclamation-triangle');
                return;
            }
            
            // Validate email
            if (!emailRegex.test(email.value)) {
                e.preventDefault();
                email.style.borderColor = 'var(--danger)';
                emailInvalid.style.display = 'block';
                showToast('Please enter a valid email address', 'warning', 'bi-exclamation-triangle');
                return;
            }
            
            // Validate password strength
            if (password.value.length < 8) {
                e.preventDefault();
                showToast('Password must be at least 8 characters', 'warning', 'bi-exclamation-triangle');
                return;
            }
            
            // Validate terms
            if (!termsCheckbox.checked) {
                e.preventDefault();
                termsCheckbox.closest('.terms-section').style.border = '2px solid var(--danger)';
                showToast('You must agree to the Terms & Conditions', 'warning', 'bi-exclamation-triangle');
                setTimeout(() => {
                    termsCheckbox.closest('.terms-section').style.border = '';
                }, 3000);
                return;
            }
            
            // Show loading state
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<div class="spinner me-2"></div> Creating Account...';
            
            showToast('Creating your account...', 'info', 'bi-hourglass');
        });

        // Auto-capitalize name
        username.addEventListener('blur', function() {
            this.value = this.value.split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + Enter to submit
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                registerBtn.click();
            }
            
            // Escape to clear form
            if (e.key === 'Escape') {
                if (confirm('Clear all fields?')) {
                    username.value = '';
                    email.value = '';
                    password.value = '';
                    adminCode.value = '';
                    termsCheckbox.checked = false;
                    checkPasswordStrength();
                    showToast('Form cleared', 'info', 'bi-eraser');
                }
            }
        });

        // Welcome message
        setTimeout(() => {
            showToast('👋 Join ShopMetuge today!', 'info', 'bi-hand-thumbs-up');
        }, 1000);

        // Console greeting
        console.log('📝 Registration page loaded - Join our community!');

        // Expose functions globally
        window.showToast = showToast;
    })();
</script>
{% endblock %}
